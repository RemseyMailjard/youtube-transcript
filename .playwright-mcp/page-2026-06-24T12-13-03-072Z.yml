l amount of work inside of the transaction and then commit it uh another locking and blocking related thing that we run into a lot is updating more rows than you really need to so for instance let's say you're updating a row and setting a value that may already be said so let's say you have a I don't know a process date and then a flag that's a Blan kind of flag that says is processed and if you're doing an update that says update your table set is processed equal one where the process date is in the past something like that well it could be that that starts out with a small number of rows but as that table grows over time you end up doing that update thousands and thousands of rows or millions of rows and what I like to do in that case instead is say do the update set the is processed equal one in this example where the process date whatever the previous wear Clause was and where the process date does not equal one and then what you're doing is you're saying only update the rows where the process date is not already set and that's one of those inefficient things you run into a SQL Server is that it will let you update a row or a column in a row to be exactly the same thing it was before so really there's no change but the amount of work that's required through the transaction log and uh uh being able to write the data page dis and all that it's just the same as though you were actually changing it so if there's a way to make it so your update statements are only really updating when something needs to change uh that can make a big difference uh there was a client we worked with where they had a website and on every single web page view there was something they were doing with an update like that uh I forget what it was tracking but we were able to put in the where Clause to say where the value doesn't equal what we're trying to set it to and it eliminated almost all of their blocking by doing that update on that workf so there's a lot of things that we run into uh 